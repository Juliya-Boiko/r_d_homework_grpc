name: Build & Stage Deploy

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        run: |
          echo "TAG=sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=orders-local" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t $IMAGE:$TAG .

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag image for registry
        run: docker tag $IMAGE:$TAG ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/orders:$TAG

      - name: Push image to registry
        run: docker push ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/orders:$TAG

      - name: Create release manifest
        run: |
          echo "{\"commit\":\"${GITHUB_SHA}\", \"services\":{\"orders\":{\"image\":\"$IMAGE:$TAG\"}}}" > release-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: release-manifest.json

      - name: Deploy to stage (local Docker)
        run: |
          IMAGE=$(jq -r '.services.orders.image' release-manifest.json)

          # Delete old container if exists
          docker ps -a -q --filter "name=orders" | xargs -r docker rm -f

          # Run new container
          docker run -d -p 3021:3021 --name orders $IMAGE

          echo "Waiting for app to start..."
          timeout=30
          while ! docker logs orders 2>&1 | grep -q "orders-service started on"; do
            echo "Retry..."
            sleep 3
            ((timeout-=3))
            if [ $timeout -le 0 ]; then
              echo "Timeout waiting for app"
              docker logs orders
              exit 1
            fi
          done

          echo "App started. Checking endpoint..."
          curl -f http://localhost:3021/orders/health
          
      - name: Show container logs
        run: docker logs orders