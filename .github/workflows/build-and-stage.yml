name: Build & Stage Deploy

on:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клон репозиторію
      - uses: actions/checkout@v4

      # 2️⃣ Змінні для Docker
      - name: Set variables
        run: |
          echo "TAG=sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE=orders-local" >> $GITHUB_ENV

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t $IMAGE:$TAG .

      # 4️⃣ Створюємо release manifest
      - name: Create release manifest
        run: |
          echo "{\"commit\":\"${GITHUB_SHA}\", \"services\":{\"orders\":{\"image\":\"$IMAGE:$TAG\"}}}" > release-manifest.json

      # 5️⃣ Завантажуємо manifest
      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: release-manifest.json

      # 6️⃣ Розгортаємо контейнер і чекаємо, поки він стартує
      - name: Deploy to stage (local Docker)
        run: |
          IMAGE=$(jq -r '.services.orders.image' release-manifest.json)

          # Delete old container if exists
          docker ps -a -q --filter "name=orders" | xargs -r docker rm -f

          # Run new container
          docker run -d -p 3021:3021 --name orders $IMAGE

          echo "Waiting for app to start..."
          timeout=30
          while ! docker logs orders 2>&1 | grep -q "orders-service started on"; do
            echo "Retry..."
            sleep 3
            ((timeout-=3))
            if [ $timeout -le 0 ]; then
              echo "Timeout waiting for app"
              docker logs orders
              exit 1
            fi
          done

          echo "App started. Checking endpoint..."
          curl -f http://localhost:3021/orders/health
          
      # 7️⃣ Логи для дебагу (опційно)
      - name: Show container logs
        run: docker logs orders