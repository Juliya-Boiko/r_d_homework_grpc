name: PR Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      # Додатковий quality gate (Docker build validation)
      - run: docker build -f Dockerfile -t test-image .